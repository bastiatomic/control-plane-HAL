<main class="login-shell">
  <section class="login-panel" aria-labelledby="login-heading">
    <div class="brand-block">
      <span class="brand-mark">HAL</span>
      <p>Infrastructure Control Plane</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
      <div class="form-heading">
        <p class="eyebrow">Managed access</p>
        <h1 id="login-heading">Sign in</h1>
        <p>Accounts are provisioned by platform operations.</p>
      </div>

      <label>
        <span>Email</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="name@company.com"
        />
      </label>
      <p class="field-error" *ngIf="emailInvalid">Enter a valid email address.</p>

      <label>
        <span>Password</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
        />
      </label>
      <p class="field-error" *ngIf="passwordInvalid">Password is required.</p>

      <div class="notice" *ngIf="errorMessage" role="alert">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>
  </section>
</main>
