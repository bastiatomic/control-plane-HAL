<header class="topbar">
  <div>
    <p class="eyebrow">{{ state.activeRole }}</p>
    <h1>Infrastructure control plane</h1>
  </div>
  <div class="top-actions">
    <span>{{ state.user?.name || 'HAL user' }}</span>
    <button type="button" class="secondary" (click)="state.loadAll()">Refresh</button>
    <button type="button" class="ghost" (click)="state.logout()">Sign out</button>
  </div>
</header>
